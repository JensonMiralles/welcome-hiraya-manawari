<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Outer oval border -->
  <ellipse cx="256" cy="256" rx="220" ry="240" stroke="#D4AF7A" stroke-width="8" fill="none"/>

  <!-- Inner decorative oval -->
  <ellipse cx="256" cy="256" rx="196" ry="216" stroke="#D4AF7A" stroke-width="2" fill="none" opacity="0.35"/>

  <!-- Central rising star / spark -->
  <g stroke="#D4AF7A" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="256" y1="128" x2="256" y2="320"/>
    <line x1="256" y1="128" x2="232" y2="168"/>
    <line x1="256" y1="128" x2="280" y2="168"/>
    <line x1="196" y1="224" x2="316" y2="224"/>
    <line x1="212" y1="168" x2="300" y2="280"/>
    <line x1="300" y1="168" x2="212" y2="280"/>
  </g>

  <!-- Accent dots at ray tips -->
  <g fill="#D4AF7A">
    <circle cx="256" cy="120" r="6"/>
    <circle cx="188" cy="224" r="5"/>
    <circle cx="324" cy="224" r="5"/>
    <circle cx="204" cy="160" r="4"/>
    <circle cx="308" cy="160" r="4"/>
    <circle cx="204" cy="288" r="4"/>
    <circle cx="308" cy="288" r="4"/>
  </g>

  <!-- Stylized "H" letterform -->
  <g stroke="#D4AF7A" stroke-width="6" stroke-linecap="round" fill="none">
    <line x1="228" y1="300" x2="228" y2="370"/>
    <line x1="284" y1="300" x2="284" y2="370"/>
    <line x1="228" y1="335" x2="284" y2="335"/>
  </g>

  <!-- Top ornamental flourish -->
  <path d="M216 108 Q236 92 256 98 Q276 92 296 108" stroke="#D4AF7A" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Bottom ornamental flourish -->
  <path d="M210 388 Q233 404 256 396 Q279 404 302 388" stroke="#D4AF7A" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
